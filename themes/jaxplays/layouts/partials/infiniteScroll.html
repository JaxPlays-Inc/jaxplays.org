<nav class="post-navigation relative flex-l flex-wrap justify-between mw8 center ph3">
  {{ with .PrevInSection }}
  <h3>Previous {{ title .Section }}:<br /> <a id="prev-post-link" href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
  {{ end }}
  {{ with .NextInSection }}
  <h3>Next {{ title .Section }}:<br /> <a id="next-post-link" href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
  {{ end }}
</nav>

<script>
  window.nextPostUrl = document.getElementById('next-post-link')?.href || "";
  window.prevPostUrl = document.getElementById('prev-post-link')?.href || "";
</script>
<script>
document.addEventListener("DOMContentLoaded", function() {
  let loading = false;
  let prevUrl = document.getElementById('prev-post-link')?.href || "";

  const updateActiveArticleHistory = function() {
    const articles = Array.from(document.querySelectorAll('.main-content'));
    if (!articles.length) return;

    const viewportMid = window.innerHeight * 0.5;
    let bestArticle = null;
    let bestDistance = Infinity;

    articles.forEach(article => {
      const rect = article.getBoundingClientRect();
      const articleMid = rect.top + (rect.height / 2);
      const distance = Math.abs(articleMid - viewportMid);
      if (distance < bestDistance) {
        bestDistance = distance;
        bestArticle = article;
      }
    });

    if (!bestArticle) return;

    const targetUrl = bestArticle.dataset.canonicalUrl;
    const targetTitle = bestArticle.dataset.documentTitle;
    if (targetUrl && window.location.href !== targetUrl) {
      history.replaceState({}, '', targetUrl);
    }
    if (targetTitle && document.title !== targetTitle) {
      document.title = targetTitle;
    }
  };

  const maybeLoadPrevious = function() {
    if (loading || !prevUrl) return;

    if (window.scrollY < window.innerHeight * 0.4) {
      return;
    }

    const scrollHeight = document.documentElement.scrollHeight || document.body.offsetHeight;
    const distanceToBottom = scrollHeight - (window.innerHeight + window.scrollY);
    const triggerDistance = Math.max(window.innerHeight * 2.5, 1800);

    if (distanceToBottom <= triggerDistance) {
      loading = true;
      fetch(prevUrl)
        .then(response => response.text())
        .then(html => {
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, 'text/html');
          const prevHeader = doc.querySelector('header');
          const prevPost = doc.querySelector('.main-content');
          const prevNav = doc.querySelector('.post-navigation');

          if (prevPost) {
            prevPost.id = '';
            if (prevHeader) {
              document.querySelector('.main-content').parentNode.appendChild(prevHeader);
            }
            document.querySelector('.main-content').parentNode.appendChild(prevPost);
            if (prevNav) {
              document.querySelector('.main-content').parentNode.appendChild(prevNav);
            }

            if (window.jaxplaysAds && typeof window.jaxplaysAds.registerSlots === 'function') {
              if (prevHeader) {
                window.jaxplaysAds.registerSlots(prevHeader);
              }
              window.jaxplaysAds.registerSlots(prevPost);
              if (prevNav) {
                window.jaxplaysAds.registerSlots(prevNav);
              }
            }

            // Stash URL/title on the appended post and only switch history
            // once that appended article becomes the primary thing in view.
            const newUrl = doc.querySelector('link[rel="canonical"]')?.href
              || prevPost.querySelector('a[rel="bookmark"]')?.href
              || prevUrl;
            const newTitle = doc.querySelector('title')?.innerText || document.title;
            prevPost.dataset.canonicalUrl = newUrl;
            prevPost.dataset.documentTitle = newTitle;

            // Now, update prevUrl to the newly appended nav
            prevUrl = prevNav?.querySelector('#prev-post-link')?.href || "";
          } else {
            prevUrl = null;
          }
          loading = false;
        });
    }
  };

  window.addEventListener('scroll', maybeLoadPrevious, { passive: true });
  window.addEventListener('scroll', updateActiveArticleHistory, { passive: true });
  window.addEventListener('resize', maybeLoadPrevious);
  window.addEventListener('resize', updateActiveArticleHistory);
  setTimeout(maybeLoadPrevious, 500);
  setTimeout(updateActiveArticleHistory, 500);
});
</script>
