profile:
  type: profile
  submit_label: Submit Profile
  success: Thank you. Your profile submission has been sent to JaxPlays for review.
  fields:
    - name: email
      label: Email
      type: email
      required: true
      description: Your email address.
    - name: submitter_name
      label: Name
      type: text
      required: true
      description: Who are you? What is your current professional name?
    - name: other_names
      label: Other Names
      type: textarea
      description: What other names have you been credited under in past productions? Please put each name on its own line.
    - name: headshot
      label: Headshot
      type: file
      accept: image/png,image/jpeg,image/webp
      description: Upload your most recent professional headshot. [**(4:5 ratio, 8" x 10" recommended)**](/social-media-aspect-ratios.webp)
    - name: headshot_credit
      label: Headshot Credit
      type: text
      description: Please provide any attribution necessary, including links if needed for the photograph.
    - name: biography
      label: Biography
      type: textarea
      description: Provide a short biography for the top of your JaxPlays person page.
    - name: social_links
      label: Social Links
      type: checkbox
      description: Select the profile links you would like to add.
      options:
        - Website
        - Facebook
        - Instagram
        - Threads
        - LinkedIn
        - Bluesky
        - X / Twitter
        - IMDB
        - IBDB
        - Backstage
    - name: website
      label: Website
      type: url
      value: https://
      show_if:
        field: social_links
        value: Website
    - name: facebook
      label: Facebook
      type: url
      value: https://www.facebook.com/
      show_if:
        field: social_links
        value: Facebook
    - name: instagram
      label: Instagram
      type: url
      value: https://www.instagram.com/
      show_if:
        field: social_links
        value: Instagram
    - name: threads
      label: Threads
      type: url
      value: https://www.threads.net/@
      show_if:
        field: social_links
        value: Threads
    - name: linkedin
      label: LinkedIn
      type: url
      value: http://linkedin.com/in/
      show_if:
        field: social_links
        value: LinkedIn
    - name: bluesky
      label: Bluesky
      type: url
      value: https://bsky.app/profile/
      show_if:
        field: social_links
        value: Bluesky
    - name: twitter
      label: X / Twitter
      type: url
      value: https://x.com/
      show_if:
        field: social_links
        value: X / Twitter
    - name: imdb
      label: IMDB
      type: url
      value: https://www.imdb.com/name/
      show_if:
        field: social_links
        value: IMDB
    - name: ibdb
      label: IBDB
      type: url
      value: https://www.ibdb.com/broadway-cast-staff/
      show_if:
        field: social_links
        value: IBDB
    - name: backstage
      label: Backstage
      type: url
      value: https://www.backstage.com/u/
      show_if:
        field: social_links
        value: Backstage
    - name: notes
      label: Notes
      type: textarea
      description: Anything else you need to let us know? This will not be published.

production:
  type: production
  submit_label: Submit Production
  success: Thank you. Your production submission has been sent to JaxPlays for review.
  fields:
    - name: email
      label: Email
      type: email
      required: true
      description: Your email address.
    - name: submitter_name
      label: Your Name
      type: text
      required: true
      description: Who are you?
    - name: title
      label: Title of Production
      type: text
      required: true
      description: Enter the title of the production.
    - name: theatre
      label: Theatre
      type: text
      required: true
      suggestions: theatres
      description: Which theatre company is producing this show? If it is not listed, select Theatre Not Listed and also submit the [theatre company form](/submit/theatre/).
    - name: venue
      label: Venue
      type: text
      required: true
      suggestions: venues
      description: Which venue is the production being staged at? If it is not listed, select Venue Not Listed and add the address below.
    - name: other_venue
      label: Other Venue
      type: textarea
      description: If the venue is not listed, provide the venue name and address.
      show_if:
        field: venue
        value: Venue Not Listed
    - name: genres
      label: Genres
      type: token_picker
      required: true
      description: Select all genres that apply. JaxPlays only accepts scripted theatrical productions.
      placeholder: Select genres
      options:
        - Play
        - Musical
        - Cabaret
        - Opera
        - Staged Reading
        - Comedy
        - Drama
        - Fantasy
        - Farce
        - Historical
        - Horror
        - Mystery
        - Political
        - Tragedy
        - Other
    - name: other_genres
      label: Other Genres
      type: textarea
      description: Add any genres not listed above, preferably one per line.
      show_if:
        field: genres
        value: Other
    - name: showtimes
      label: Showtimes
      type: textarea
      required: true
      description: Enter dates and times manually or add them with the date picker below. ISO-style dates are helpful, but JaxPlays can clean up human-readable lists.
      datetime_helper: true
    - name: ticket_link
      label: Ticket Link
      type: url
      description: Provide the link to your ticket platform for this production.
    - name: web_page
      label: Web Page
      type: url
      description: Provide the production page on your website if one exists.
    - name: poster
      label: Poster
      type: file
      accept: image/png,image/jpeg,image/webp,application/pdf
      description: Upload the poster for the production. [**(2:3 aspect (24" x 36") recommended**](/social-media-aspect-ratios.webp).
    - name: poster_credit
      label: Poster Credit
      type: text
      description: Please provide any attribution necessary for the poster graphics, design or photography.
    - name: program
      label: Playbill / Bulletin / Program
      type: file
      accept: image/png,image/jpeg,image/webp,application/pdf
      description: Upload a program or handout if you have one.
    - name: description
      label: Description
      type: textarea
      maxlength: 200
      description: Provide a short 150-200 character description of the show.
    - name: synopsis
      label: Synopsis / Production Notes
      type: textarea
      description: Provide any synopsis or production notes you would like published on the page.
    - name: cast
      label: Cast List
      type: textarea
      description: Provide a cast list if the show has been cast.
    - name: understudies
      label: Understudies List
      type: textarea
      description: Provide understudy, standby or swing credits if applicable.
    - name: crew
      label: Crew List
      type: textarea
      description: Provide a crew list if available.
    - name: orchestra
      label: Orchestra List
      type: textarea
      description: Provide an orchestra list if applicable.
    - name: notes
      label: Notes
      type: textarea
      description: Anything else you need to let us know? This will not be published.

theatre:
  type: theatre
  submit_label: Submit Theatre
  success: Thank you. Your theatre submission has been sent to JaxPlays for review.
  fields:
    - name: email
      label: Email
      type: email
      required: true
    - name: submitter_name
      label: Your Name
      type: text
      required: true
    - name: theatre_name
      label: Theatre's Name
      type: text
      required: true
      description: What is the name of the theatre company?
    - name: logo
      label: Logo
      type: file
      required: true
      accept: image/png,image/jpeg,image/webp,application/pdf
      description: Upload the logo for the theatre.
    - name: logo_credit
      label: Logo Credit
      type: text
      description: Please provide any attribution necessary, including links if needed for the logo.
    - name: theatre_color
      label: Theatre Color
      type: text
      value: "#000000"
      placeholder: "#000000"
      color_picker: true
      description: Provide a preferred hex color for the theatre calendar.
    - name: founded
      label: When was the theatre founded?
      type: text
    - name: history
      label: History / Description
      type: textarea
      description: Provide a short history of the theatre company for the theatre page.
    - name: contact_fields
      label: Contact and Social Links
      type: checkbox
      description: Select the contact fields you would like to add.
      options:
        - Phone
        - Website
        - Facebook
        - Instagram
        - Threads
        - LinkedIn
        - Bluesky
        - X / Twitter
    - name: phone
      label: Phone
      type: tel
      placeholder: (904) 555-1212
      phone_format: true
      show_if:
        field: contact_fields
        value: Phone
    - name: website
      label: Website
      type: url
      value: https://
      show_if:
        field: contact_fields
        value: Website
    - name: facebook
      label: Facebook
      type: url
      value: https://www.facebook.com/
      show_if:
        field: contact_fields
        value: Facebook
    - name: instagram
      label: Instagram
      type: url
      value: https://www.instagram.com/
      show_if:
        field: contact_fields
        value: Instagram
    - name: threads
      label: Threads
      type: url
      value: https://www.threads.net/@
      show_if:
        field: contact_fields
        value: Threads
    - name: linkedin
      label: LinkedIn
      type: url
      value: http://linkedin.com/in/
      show_if:
        field: contact_fields
        value: LinkedIn
    - name: bluesky
      label: Bluesky
      type: url
      value: https://bsky.app/profile/
      show_if:
        field: contact_fields
        value: Bluesky
    - name: twitter
      label: X / Twitter
      type: url
      value: https://x.com/
      show_if:
        field: contact_fields
        value: X / Twitter
    - name: has_venue
      label: Dedicated Venue
      type: checkbox
      options:
        - Yes, we have a dedicated venue
    - name: venue_name
      label: Venue Name
      type: text
      description: If your venue has the same name as your theatre company, enter the theatre company name again.
      show_if:
        field: has_venue
        value: Yes, we have a dedicated venue
    - name: venue_address
      label: Venue Address
      type: textarea
      description: Provide the street address of your venue.
      show_if:
        field: has_venue
        value: Yes, we have a dedicated venue
    - name: notes
      label: Notes
      type: textarea
      description: Anything else you need to let us know? This will not be published.

audition:
  type: audition
  submit_label: Submit Audition Announcement
  success: Thank you. Your audition announcement has been sent to JaxPlays for review.
  fields:
    - name: email
      label: Email
      type: email
      required: true
    - name: submitter_name
      label: Your Name
      type: text
      required: true
    - name: theatre
      label: Theatre
      type: text
      required: true
      suggestions: theatres
      description: Which theatre company is holding auditions?
    - name: production_title
      label: Production Title
      type: text
      required: true
    - name: announcement_graphic
      description: Featured image for announcement **([2:1 ratio, 1200×600px recommended](/social-media-aspect-ratios.webp))**
      label: Announcement Graphic
      type: file
      accept: image/png,image/jpeg,image/webp,application/pdf
    - name: description
      label: Short Description
      type: textarea
      maxlength: 200
      description: Provide a short summary for the audition announcement.
    - name: announcement_text
      label: Full Announcement Text
      type: textarea
      description: Paste the full audition announcement or any extra details.
    - name: notes
      label: Notes
      type: textarea
      description: Anything else you need to let us know? This will not be published.
